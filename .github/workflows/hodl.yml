name: HODL Signal Bot

on:
  schedule:
    - cron: '45 3-9 * * 1-5'  # Every hour from 09:15 to 15:15 IST, weekdays
    - cron: '45 4 * * 0,6'    # Once at 10:15 IST on weekends
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Restore signal cache
        uses: actions/cache@v4
        with:
          path: .last_signal_hash
          key: signal-hash

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MACD + Impulse + Bollinger script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python bot.py
